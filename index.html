<!DOCTYPE html><html lang="zh-Hant"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找助教 🙋🏻‍♀️</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #1a73e8; margin-top: 0; margin-bottom: 20px; font-size: 1.8rem; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #e0e0e0; box-sizing: border-box; font-size: 1.1rem; outline: none; }
        input:focus { border-color: #1a73e8; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #1a73e8; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 1rem; font-weight: bold; min-height: 1.2em; }
    </style>
<script defer="" data-domain="py-candy.tiiny.site" src="https://analytics.tiiny.site/js/plausible.js"></script></head>
<body>

<div class="card">
    <h2>找助教 🙋🏻‍♀️</h2>
    <form id="helpForm">
        <input type="text" id="studentInfo" placeholder="輸入座號" required="" autocomplete="off">
        <button type="submit" id="submitBtn">呼叫 Candy</button>
    </form>
    <div id="status"></div>
</div>

<script>
    const helpForm = document.getElementById('helpForm');
    const status = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    helpForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const info = document.getElementById('studentInfo').value;
        const topic = '%%NTFY_TOPIC%%';

        status.innerText = "傳送中...";
        status.style.color = "#666";
        submitBtn.disabled = true;

        try {
            const response = await fetch(`https://ntfy.sh/${topic}`, {
                method: 'POST',
                body: `座號 ${info} 正在找助教協助！`
            });

            if (response.ok) {
                status.style.color = "#28a745";
                status.innerText = "已成功呼叫！助教馬上來。";
                document.getElementById('studentInfo').value = ''; 
            } else {
                throw new Error();
            }
        } catch (error) {
            status.style.color = "#dc3545";
            status.innerText = "發送失敗，請重試。";
        } finally {
            setTimeout(() => {
                submitBtn.disabled = false;
            }, 3000);
        }
    });
</script>


</body></html>
