name: Deploy to GitHub Pages
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Inject Topic Name
        run: |
          sed -i "s/%%NTFY_TOPIC%%/${{ secrets.NTFY_TOPIC }}/g" index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages